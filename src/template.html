<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickIt</title>
    <link rel="icon" href="./assets/img/pin.svg">
</head>
<body>
    <div id="allContent">
        <div id="control">
            <nav>
                <button id="newTask"> <img src="./assets/img/plus.svg"> Task </button>
                <button id="newProject"> <img src="./assets/img/plus.svg"> Project</button>
        </div>

        </nav>
        <ul id="allTasks">
        </ul>

        <fieldset id="allProjects">
            <legend>Select a project:</legend>
        </fieldset>
    </div>

    <dialog id="projectOpen">
        <button id="projectClose"><img src="./assets/img/plus.svg"></button>
        <div>Do you want to add a new project?</div>

        <form id="projectInfo"> 
            <div>
                <label for="title">Task title:</label>
                <input name="title" id="title" maxlength="10">
                <!-- maybe this value would need to be increased/decreased -->
            </div>

            <div>
                <label for="priority">Priority</label>
                    <select name="priority" id="priority">
                            <option>Critical</option>
                            <option>High</option>
                            <option selected>Medium</option>
                            <option>Low</option>
                            <option>Minimal</option>
                    </select>
            </div>

            <input id="projectSubmit" type="submit" value="Submit" />
        </form>
        
    </dialog>

    <dialog id="taskOpen">
        <button id="taskClose"><img src="./assets/img/plus.svg"></button>
        <div>Do you want to add a new task?</div>

        <form id="taskInfo">
            <div>
                <label for="title">Task title:</label>
                <input name="title" id="title">
            </div>

            <div>
                <label for="description">Task description:</label>
                <input name="description" id="description">
            </div>

            <div>
                <label for="priority">Priority</label>
                    <select name="priority" id="priority">
                            <option>Critical</option>
                            <option>High</option>
                            <option selected>Medium</option>
                            <option>Low</option>
                            <option>Minimal</option>
                    </select>
            </div>

            <div> 
                <label for="due">Due</label>
                <input type="datetime-local" name="due" id="due">
            </div>

            <button id="taskSubmit" type="submit" value="Pin"><img src="./assets/img/pin.svg">Pin</button>
        </form>
    </dialog>
    
</body>
</html>
