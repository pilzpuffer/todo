<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickIt</title>
    <link rel="icon" href="./assets/img/pin.svg">
</head>
<body>
    <div id="allContent">
        <div id="control">
            <nav>
                <button id="newTask"> <img src="./assets/img/plus.svg"> Task </button>
                <button id="newProject"> <img src="./assets/img/plus.svg"> Project</button>
            </nav>
        </div>

        <fieldset>
            <legend>Select a project:</legend>

            <input type="radio" id="main" name="project" value="main" />
		    <label for="main">Main</label>

        </fieldset>
    </div>

    <dialog id="projectOpen">
        <div>Do you want to add a new project?</div>
        <button id="projectClose">Close</button>
        <button id="projectSubmit">Submit</button>
    </dialog>

    <dialog id="taskOpen">
        <div>Do you want to add a new task?</div>
        <button id="taskClose">Close</button>
        <button id="taskSubmit">Submit</button>
    </dialog>
    
</body>
</html>
